<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PahadiGaadi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      margin-bottom: 10px;
      color: #0f172a;
    }

    .hero p {
      color: #555;
    }

    .container {
      max-width: 400px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .contact {
      text-align: center;
      margin-top: 20px;
      color: #444;
    }
  </style>
</head>

<body>

  <header>🚗 PahadiGaadi</header>

  <div class="hero">
    <h1>Your Ride in the Hills</h1>
    <p>Fast • Safe • Reliable</p>
  </div>

  <div class="container">
    <h3>Book Your Ride</h3>

    <input type="text" id="pickup" placeholder="Enter Pickup Location">
    <input type="text" id="drop" placeholder="Enter Drop Location">

    <button onclick="bookRide()">Book Ride</button>
  </div>

  <div class="contact">
    📞 Contact: +91-XXXXXXXXXX
  </div>

  <script>
    function bookRide() {
      let pickup = document.getElementById("pickup").value;
      let drop = document.getElementById("drop").value;

      if(pickup === "" || drop === "") {
        alert("Please enter both locations!");
      } else {
        alert("Ride booked from " + pickup + " to " + drop);
      }
    }
  </script>

</body>
</html>

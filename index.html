<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PahadiGaadi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #0f172a, #1e293b);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo img {
  width: 55px;
  height: 55px;
  border-radius: 10px;
  background: white;
  padding: 4px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 10px;
}

/* CARD */
.container {
  background: white;
  color: black;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

/* INPUT */
.input-box {
  position: relative;
  margin-bottom: 12px;
}

.input-box input {
  width: 100%;
  padding: 14px 14px 14px 40px;
  border-radius: 25px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* LOCATION BUTTON */
.loc-btn {
  disply:none;
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: #0f172a;
  color: white;
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

/* VEHICLE */
.vehicle-box {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.vehicle {
  flex: 1;
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  border: 2px solid #ddd;
  cursor: pointer;
}

.vehicle.active {
  background: #0f172a;
  color: white;
}

/* BUTTON */
.book-btn {
  width: 100%;
  padding: 14px;
  background: green;
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 15px;
  font-size: 16px;
}

/* MAP */
#map {
  height: 300px;
  margin: 20px;
  border-radius: 15px;
}

/* BOTTOM */
.bottom-sheet {
  background: white;
  color: black;
  padding: 15px;
}

.price {
  font-weight: bold;
  color: green;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>PahadiGaadi</span>
  </div>
</header>

<div class="hero">
  <h2>Your Ride in the Hills</h2>
</div>

<div class="container">
<!-- USER PROFILE -->
<div class="input-box">
  <input type="text" id="name" placeholder="👤 Your Name">
</div>

<div class="input-box">
  <input type="tel" id="phone" placeholder="📞 Phone Number">
</div>
  <!-- Pickup -->
  <div class="input-box">
    <input type="text" id="pickup" placeholder="📍 Pickup Location" oninput="showRoute()">
  </div>

  <!-- Drop -->
  <div class="input-box">
    <input type="text" id="drop" placeholder="🏁 Drop Location" oninput="showRoute()">
  </div>

  <!-- Vehicles -->
  <div class="vehicle-box">
    <div class="vehicle" onclick="selectVehicle(this,'Bike')">🏍 Bike</div>
    <div class="vehicle" onclick="selectVehicle(this,'Car')">🚗 Car</div>
    <div class="vehicle" onclick="selectVehicle(this,'SUV')">🚙 SUV</div>
  </div>
  
  <!-- Save Profile -->
<button onclick="saveUser()" class="book-btn">Save Profile</button>

<!-- Book -->
<button class="book-btn" onclick="bookRide()">Book Ride</button>
</div>

<div id="map"></div>

<div class="bottom-sheet">
  Distance: <span id="distance">0</span> km <br>
  Fare: ₹<span id="price" class="price">0</span>
</div>

<script>
let selectedVehicle = "";
let map, marker, directionsService, directionsRenderer;
function saveUser() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if (!name || !phone) {
    alert("Profile fill kar bhai 😅");
    return;
  }

  localStorage.setItem("userName", name);
  localStorage.setItem("userPhone", phone);

  alert("Profile saved ✅");
}
function initMap() {
  const defaultLocation = { lat: 28.6139, lng: 77.2090 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: defaultLocation,
    zoom: 13,
  });

  marker = new google.maps.Marker({
    position: defaultLocation,
    map: map,
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);
}

function getLocation() {
  navigator.geolocation.getCurrentPosition((pos) => {
    const loc = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
    };
    map.setCenter(loc);
    marker.setPosition(loc);
  });
}

function selectVehicle(el, v) {
  document.querySelectorAll('.vehicle').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  selectedVehicle = v;
  showRoute();
}

function showRoute() {
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  if (!pickup || !drop) return;

  directionsService.route({
    origin: pickup,
    destination: drop,
    travelMode: 'DRIVING',
  }, function(result, status) {

    if (status === "OK") {
      directionsRenderer.setDirections(result);

      let km = (result.routes[0].legs[0].distance.value / 1000).toFixed(2);

      let rate = selectedVehicle === "Bike" ? 3.5 :
                 selectedVehicle === "Car" ? 5 :
                 selectedVehicle === "SUV" ? 8 : 0;

      let price = km * rate;

      document.getElementById("distance").innerText = km;
      document.getElementById("price").innerText = Math.round(price);
    }
  });
}
function bookRide() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  if (!name || !phone || !pickup || !drop || !selectedVehicle) {
    alert("Bhai sab fill kar 😅");
    return;
  }
  // save data
  localStorage.setItem("userName", name);
  localStorage.setItem("userPhone", phone);

  let msg = `🚕 PahadiGaadi Booking

👤 Name: ${name}
📞 Phone: ${phone}

📍 Pickup: ${pickup}
🏁 Drop: ${drop}
🚗 Vehicle: ${selectedVehicle}`;

  window.open("https://wa.me/919761857987?text=" + encodeURIComponent(msg));
}
  window.onload = function () {
  document.getElementById("name").value = localStorage.getItem("userName") || "";
  document.getElementById("phone").value = localStorage.getItem("userPhone") || "";
}
</script>

<!-- API KEY YAHAN DAAL -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</body>
</html>

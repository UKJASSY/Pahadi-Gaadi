<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PahadiGaadi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 25px;
}

.container {
  background: white;
  color: black;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
}

.vehicle-box {
  display: flex;
  gap: 10px;
}

.vehicle {
  flex: 1;
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  border: 2px solid #ddd;
  cursor: pointer;
}

.vehicle.active {
  background: #0f172a;
  color: white;
}

.book-btn {
  width: 100%;
  padding: 14px;
  background: green;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
}
</style>
</head>

<body>

<header>
  <span>PahadiGaadi</span>
</header>

<div class="hero">
  <h1>Your Ride in the Hills</h1>
</div>

<div class="container">

  <div style="position: relative;">
    <input type="text" id="pickup" placeholder="📍 Pickup Location" oninput="showRoute()">
    <button onclick="getLocation()" 
    style="position:absolute; right:5px; top:5px;">📍</button>
  </div>

  <input type="text" id="drop" placeholder="🏁 Drop Location" oninput="showRoute()">

  <div class="vehicle-box">
    <div class="vehicle" onclick="selectVehicle(this, 'Bike')">Bike</div>
    <div class="vehicle" onclick="selectVehicle(this, 'Car')">Car</div>
    <div class="vehicle" onclick="selectVehicle(this, 'SUV')">SUV</div>
  </div>

  <button class="book-btn" onclick="bookRide()">Book Ride</button>
</div>

<div id="map" style="height:300px; margin:20px;"></div>

<script>
let selectedVehicle = "";
  let map, marker, geocoder, directionsService, directionsRenderer;
  
// 🚀 INIT MAP
function initMap() {
  const defaultLocation = { lat: 28.6139, lng: 77.2090 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: defaultLocation,
    zoom: 13,
  });

  marker = new google.maps.Marker({
    position: defaultLocation,
    map: map,
    draggable: true,
  });

  geocoder = new google.maps.Geocoder();
directionsService = new google.maps.DirectionsService();
directionsRenderer = new google.maps.DirectionsRenderer();

directionsRenderer.setMap(map);
  marker.addListener("dragend", function () {
    const position = marker.getPosition();

    geocoder.geocode({ location: position }, function (results, status) {
      if (status === "OK" && results[0]) {
        document.getElementById("pickup").value = results[0].formatted_address;
      }
    });
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((position) => {
      const userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude,
      };

      map.setCenter(userLocation);
      marker.setPosition(userLocation);
    });
  }
}

// 📍 LOCATION BUTTON
function getLocation() {
  navigator.geolocation.getCurrentPosition((position) => {
    const userLocation = {
      lat: position.coords.latitude,
      lng: position.coords.longitude,
    };

    map.setCenter(userLocation);
    marker.setPosition(userLocation);
  });
}

// 🚗 VEHICLE
function selectVehicle(el, v) {
  document.querySelectorAll('.vehicle').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  selectedVehicle = v;
}
function showRoute() {
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  if (!pickup || !drop) return;

  const request = {
    origin: pickup,
    destination: drop,
    travelMode: 'DRIVING',
  };

  directionsService.route(request, function(result, status) {
    if (status === 'OK') {
      directionsRenderer.setDirections(result);
    }
  });
}
// 📲 BOOK
function bookRide() {
  showRoute();
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  let msg = `Pickup: ${pickup} | Drop: ${drop} | Vehicle: ${selectedVehicle}`;
  window.open("https://wa.me/919761857987?text=" + encodeURIComponent(msg));
}
  
</script>
  
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCdQvXgtRqcUX-Vo2ngB_xL2V-cxCydmTI&callback=initMap" async defer></script>
</body>
</html>

<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PahadiGaadi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 30px;
    }

    .container {
      background: white;
      color: black;
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(45deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
    }

    .contact {
      text-align: center;
      margin: 20px;
      color: #e2e8f0;
    }
  </style></head><body>  <header>
    <img src="logo.png" style="height:40px;">
    <span>PahadiGaadi</span>
  </header>  <div class="hero">
    <h1>Your Ride in the Hills</h1>
    <p>Fast • Safe • Reliable</p>
  </div>  <div class="container">
    <h3>Book Your Ride</h3><input type="text" id="pickup" placeholder="Enter Pickup Location">
<input type="text" id="drop" placeholder="Enter Drop Location">

<button onclick="bookRide()">Book Ride</button>

  </div>  <div class="contact">
    📞 Contact: +91-9761857987
  </div>  <!-- ✅ SCRIPT HAMESHA YAHAN HOGA -->  <script>
    function bookRide() {
let pickup = document.getElementById("pickup").value;
let drop = document.getElementById("drop").value;

if(pickup === "" || drop === "") {
alert("Bhai dono location daal 😅");
return;
}

let vehicle = prompt("Vehicle choose karo:\n1. Bike 🏍️\n2. Car 🚗\n3. SUV 🚙");

if(vehicle === null) return;

let vehicleName = "";

if(vehicle == "1") vehicleName = "Bike 🏍️";
else if(vehicle == "2") vehicleName = "Car 🚗";
else if(vehicle == "3") vehicleName = "SUV 🚙";
else {
alert("Sahi option daal bhai 😅");
return;
}

let message = "🚗 PahadiGaadi Booking%0A%0A📍 Pickup: " + pickup +
"%0A🏁 Drop: " + drop +
"%0A🚘 Vehicle: " + vehicleName;

let phone = "919761857987";

let whatsappURL = "https://wa.me/" + phone + "?text=" + message;

window.open(whatsappURL, "_blank");
}  </script></body>
</html>

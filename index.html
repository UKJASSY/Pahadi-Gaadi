<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PahadiGaadi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 25px;
}

.container {
  background: white;
  color: black;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
}

.vehicle-box {
  display: flex;
  gap: 10px;
}

.vehicle {
  flex: 1;
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  border: 2px solid #ddd;
  cursor: pointer;
}

.vehicle.active {
  background: #0f172a;
  color: white;
}

.book-btn {
  width: 100%;
  padding: 14px;
  background: green;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
}
  body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('logo.png') no-repeat center;
  background-size: cover;  /* 👈 full screen cover */
  opacity: 0.04;           /* 👈 perfect balance */
  z-index: -1;
}
</style>
</head>

<body>

<header>
  <span>PahadiGaadi</span>
</header>

<div class="hero">
  <h1>Your Ride in the Hills</h1>
</div>

<div class="container">

  <div style="position: relative;">
    <input type="text" id="pickup" placeholder="📍 Pickup Location" oninput="updateMap('pickup')" onclick="setSelecting('pickup')">
    <button onclick="getLocation()" 
    style="position:absolute; right:5px; top:5px;">📍</button>
  </div>

  <input type="text" id="drop" placeholder="🏁 Drop Location" oninput="updateMap('drop')" onclick="setSelecting('drop')">

  <div class="vehicle-box">
    <div class="vehicle" onclick="selectVehicle(this, 'Bike')">Bike</div>
    <div class="vehicle" onclick="selectVehicle(this, 'Car')">Car</div>
    <div class="vehicle" onclick="selectVehicle(this, 'SUV')">SUV</div>
  </div>

  <button class="book-btn" onclick="bookRide()">Book Ride</button>
</div>

<div id="map" style="height:300px; margin:20px;"></div>

<script>

let selectedVehicle = "";
let map = L.map('map').setView([30.3165, 78.0322], 13);

let routeControl;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let pickupMarker, dropMarker;

// 📍 LOCATION BUTTON
function getLocation() {
  navigator.geolocation.getCurrentPosition(success);
}

function success(position) {
  let lat = position.coords.latitude;
  let lon = position.coords.longitude;

  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("pickup").value = data.display_name;
    });

  map.setView([lat, lon], 15);

  if (selecting === "pickup") {
    if (pickupMarker) {
      pickupMarker.setLatLng([lat, lon]);
    } else {
      pickupMarker = L.marker([lat, lon]).addTo(map);
    }
  } else {
    if (dropMarker) {
      dropMarker.setLatLng([lat, lon]);
    } else {
      dropMarker = L.marker([lat, lon]).addTo(map);
    }
  }

  showRoute();
}
function updateMap(type) {
  let location = document.getElementById(type).value;

  if (location.length < 3) return;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${location}`)
    .then(res => res.json())
    .then(data => {
      if (data.length > 0) {
        let lat = data[0].lat;
        let lon = data[0].lon;

        map.setView([lat, lon], 13);

        if (type === "pickup") {
          if (pickupMarker) {
            pickupMarker.setLatLng([lat, lon]);
          } else {
            pickupMarker = L.marker([lat, lon]).addTo(map);
          }
        } else {
          if (dropMarker) {
            dropMarker.setLatLng([lat, lon]);
         } else {
 
    dropMarker = L.marker([lat, lon]).addTo(map);
  }
}

showRoute();  
} 
});
}
let selecting = "pickup";

function setSelecting(type) {
  selecting = type;
}

map.on('click', function(e) {
  let lat = e.latlng.lat;
  let lon = e.latlng.lng;

 if (selecting === "pickup") {
  if (pickupMarker) {
    pickupMarker.setLatLng([lat, lon]);
  } else {
    pickupMarker = L.marker([lat, lon]).addTo(map);
  }
} else {
  if (dropMarker) {
    dropMarker.setLatLng([lat, lon]);
  } else {
    dropMarker = L.marker([lat, lon]).addTo(map);
  }
}

  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
    .then(res => res.json())
    .then(data => {
      if (selecting === "pickup") {
        document.getElementById("pickup").value = data.display_name;
      } else {
        document.getElementById("drop").value = data.display_name;
      }
      showRoute();
    });
});
// 🚗 VEHICLE
function selectVehicle(el, v) {
  document.querySelectorAll('.vehicle').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  selectedVehicle = v;
}
function showRoute() {

  if (pickupMarker && dropMarker) {

    if (routeControl) {
      map.removeControl(routeControl);
    }

    routeControl = L.Routing.control({
      waypoints: [
        pickupMarker.getLatLng(),
        dropMarker.getLatLng()
      ],
      lineOptions: {
        styles: [{ color: 'blue', weight: 5 }]
      },
      addWaypoints: false,
      draggableWaypoints: false,
      routeWhileDragging: false,
      createMarker: () => null
    }).addTo(map);

  }
}
// 📲 BOOK
function bookRide() {
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  let msg = `Pickup: ${pickup} | Drop: ${drop} | Vehicle: ${selectedVehicle}`;
  window.open("https://wa.me/919761857987?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>

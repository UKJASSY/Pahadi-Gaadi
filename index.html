<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PahadiGaadi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔤 FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #0f172a, #1e293b);
  color: white;
  transition: 0.3s;
}

/* 🌙 DARK MODE */
.dark {
  background: #020617;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo img {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  background: white;
  padding: 5px;
}

.logo span {
  font-size: 20px;
  font-weight: 600;
}

.toggle {
  cursor: pointer;
  font-size: 20px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 20px;
}

/* CARD */
.container {
  background: white;
  color: black;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.5s ease;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
}

/* VEHICLE */
.vehicle-box {
  display: flex;
  gap: 10px;
}

.vehicle {
  flex: 1;
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  border: 2px solid #ddd;
  cursor: pointer;
  transition: 0.3s;
}

.vehicle:hover {
  transform: scale(1.05);
}

.vehicle.active {
  background: #0f172a;
  color: white;
}

/* BUTTON */
.book-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(to right, #22c55e, #16a34a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  margin-top: 10px;
}

/* MAP */
#map {
  height: 300px;
  margin: 20px;
  border-radius: 15px;
  overflow: hidden;
}

/* 📱 BOTTOM SHEET */
.bottom-sheet {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  color: black;
  border-radius: 20px 20px 0 0;
  padding: 15px;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
}

/* PRICE */
.price {
  font-size: 20px;
  font-weight: bold;
  color: green;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>PahadiGaadi</span>
  </div>
  <div class="toggle" onclick="toggleMode()">🌙</div>
</header>

<div class="hero">
  <h2>Your Ride in the Hills</h2>
</div>

<div class="container">

  <div style="position: relative;">
    <input type="text" id="pickup" placeholder="📍 Pickup Location" oninput="showRoute()">
    <button onclick="getLocation()" 
    style="position:absolute; right:5px; top:5px;">📍</button>
  </div>

  <input type="text" id="drop" placeholder="🏁 Drop Location" oninput="showRoute()">

  <div class="vehicle-box">
    <div class="vehicle" onclick="selectVehicle(this, 'Bike')">🏍 Bike</div>
    <div class="vehicle" onclick="selectVehicle(this, 'Car')">🚗 Car</div>
    <div class="vehicle" onclick="selectVehicle(this, 'SUV')">🚙 SUV</div>
  </div>

  <button class="book-btn" onclick="bookRide()">Book Ride</button>
</div>

<div id="map"></div>

<!-- 📱 BOTTOM -->
<div class="bottom-sheet">
  Distance: <span id="distance">0</span> km <br>
  Fare: ₹<span id="price" class="price">0</span>
</div>

<script>
let selectedVehicle = "";
let map, marker, geocoder, directionsService, directionsRenderer;

// 🌙 DARK MODE
function toggleMode() {
  document.body.classList.toggle("dark");
}

// MAP
function initMap() {
  const defaultLocation = { lat: 28.6139, lng: 77.2090 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: defaultLocation,
    zoom: 13,
  });

  marker = new google.maps.Marker({
    position: defaultLocation,
    map: map,
    draggable: true,
  });

  geocoder = new google.maps.Geocoder();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);
}

// VEHICLE
function selectVehicle(el, v) {
  document.querySelectorAll('.vehicle').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  selectedVehicle = v;
  showRoute();
}

// ROUTE + PRICE
function showRoute() {
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  if (!pickup || !drop) return;

  const request = {
    origin: pickup,
    destination: drop,
    travelMode: 'DRIVING',
  };

  directionsService.route(request, function(result, status) {
    if (status === "OK") {

      directionsRenderer.setDirections(result);

      let distanceInMeters = result.routes[0].legs[0].distance.value;
      let distanceInKm = (distanceInMeters / 1000).toFixed(2);

      let rate = 0;
      if (selectedVehicle === "Bike") rate = 3.5;
      else if (selectedVehicle === "Car") rate = 5;
      else if (selectedVehicle === "SUV") rate = 8;

      let price = distanceInKm * rate;

      document.getElementById("distance").innerText = distanceInKm;
      document.getElementById("price").innerText = Math.round(price);
    }
  });
}

// BOOK
function bookRide() {
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  let msg = `Pickup: ${pickup} | Drop: ${drop} | Vehicle: ${selectedVehicle}`;
  window.open("https://wa.me/919761857987?text=" + encodeURIComponent(msg));
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</body>
</html>

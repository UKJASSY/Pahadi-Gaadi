<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PahadiGaadi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script>
function bookRide() {
  let pickup = document.querySelector("input[placeholder='Enter Pickup Location']").value;
  let drop = document.querySelector("input[placeholder='Enter Drop Location']").value;

  if(pickup === "" || drop === "") {
    alert("Bhai dono location daal 😅");
    return;
  }

  alert("Ride booked from " + pickup + " to " + drop + " 🚗");
}
</script>
</head>

<body>

  <header>🚗 PahadiGaadi</header>

  <div class="hero">
    <h1>Your Ride in the Hills</h1>
    <p>Fast • Safe • Reliable</p>
  </div>

  <div class="container">
    <h3>Book Your Ride</h3>

    <input type="text" id="pickup" placeholder="Enter Pickup Location">
    <input type="text" id="drop" placeholder="Enter Drop Location">

    <button onclick="bookRide()">Book Ride</button>
  </div>

  <div class="contact">
    📞 Contact: +91-XXXXXXXXXX
  </div>

  <script>
    function bookRide() {
      let pickup = document.getElementById("pickup").value;
      let drop = document.getElementById("drop").value;

      if(pickup === "" || drop === "") {
        alert("Please enter both locations!");
      } else {
        alert("Ride booked from " + pickup + " to " + drop);
      }
    }
  </script>
<script>
function bookRide() {
  let pickup = document.querySelector("input[placeholder='Enter Pickup Location']").value;
  let drop = document.querySelector("input[placeholder='Enter Drop Location']").value;

  if(pickup === "" || drop === "") {
    alert("Bhai dono location daal 😅");
    return;
  }

  alert("Ride booked from " + pickup + " to " + drop + " 🚗");
}
</script>
</body>
</html>
